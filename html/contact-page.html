<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cachina - Contato</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1e3a8a 0%, #0ea5e9 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        width: 100%;
        text-align: center;
      }

      .logo {
        margin-bottom: 30px;
      }

      .logo img {
        max-width: 200px;
        height: auto;
      }

      .title {
        color: #1e3a8a;
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 30px;
      }

      .contact-buttons {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 15px 20px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .btn-whatsapp {
        background: #25d366;
        color: white;
      }

      .btn-whatsapp:hover {
        background: #20b954;
        transform: translateY(-2px);
      }

      .btn-email {
        background: #ea4335;
        color: white;
      }

      .btn-email:hover {
        background: #d33b2c;
        transform: translateY(-2px);
      }

      .btn-instagram {
        background: linear-gradient(
          45deg,
          #f09433 0%,
          #e6683c 25%,
          #dc2743 50%,
          #cc2366 75%,
          #bc1888 100%
        );
        color: white;
      }

      .btn-instagram:hover {
        transform: translateY(-2px);
      }

      .btn-maps {
        background: #4285f4;
        color: white;
      }

      .btn-maps:hover {
        background: #3367d6;
        transform: translateY(-2px);
      }

      .icon {
        width: 20px;
        height: 20px;
      }

      .footer {
        margin-top: 30px;
        color: #666;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <img src="./icons/cachinaicon.png" alt="Cachina Logo" />
      </div>

      <h1 class="title">Entre em Contato</h1>

      <div class="contact-buttons">
        <a
          href="https://wa.me/5584991551968"
          class="btn btn-whatsapp"
          target="_blank"
          rel="noopener"
        >
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path

            />
          </svg>
          WhatsApp
        </a>

        <a
          href="mailto:comercial@cachina.com.br"
          class="btn btn-email"
          target="_blank"
          rel="noopener"
        >
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"
            />
          </svg>
          Email
        </a>

        <a
          href="https://instagram.com/cachinasolucoes"
          class="btn btn-instagram"
          target="_blank"
          rel="noopener"
        >
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"
            />
          </svg>
          Instagram
        </a>

        <a
          href="https://maps.app.goo.gl/xkkwZSTTCkWwqtZy5"
          class="btn btn-maps"
          target="_blank"
          rel="noopener"
        >
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"
            />
          </svg>
          Localização
        </a>
      </div>

      <!-- Google Maps Embed -->
      <div style="margin-top: 20px">
        <h3 style="color: #1e3a8a; font-size: 18px; margin-bottom: 10px">
          Nossa Localização
        </h3>
        <iframe
          src="https://www.google.com/maps?q=cachina+soluções&output=embed"
          width="100%"
          height="200"
          style="border: 0; border-radius: 10px"
          allowfullscreen=""
          loading="lazy"
          title="Localização da Cachina Tecnologia"
        >
        </iframe>
      </div>

      <div class="footer">
        <p>© 2024 Cachina Tecnologia</p>
        <p>Soluções em Tecnologia</p>
      </div>
    </div>
  </body>
</html>
